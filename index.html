<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SchoolHub - Галерея людей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Плавающая кнопка для Telegram -->
    <a href="https://t.me/school_hub_btheb_bot" target="_blank" class="telegram-button" title="Жалобы и предложения">
        <span class="telegram-icon">💬</span>
        <span class="telegram-text">Жалобы и предложения</span>
    </a>

    <div class="container">
        <h1 class="title">SchoolHub</h1>
        <p class="subtitle">Наши люди</p>
        
        <div class="buttons-container" id="buttonsContainer">
            <!-- Кнопки будут создаваться автоматически -->
        </div>

        <div class="gallery" id="gallery">
            <div class="gallery-header">
                <h2 id="selectedPersonName"></h2>
                <div class="header-buttons">
                    <button class="copy-gallery-btn" id="copyGalleryBtn" title="Копировать ссылку на галерею">
                        <span class="copy-icon">🔗</span>
                        <span class="copy-text">Галерея</span>
                    </button>
                    <button class="close-btn" onclick="closeGallery()">×</button>
                </div>
            </div>
            <div class="photos-grid" id="photosGrid">
                <!-- Фото будут загружаться сюда -->
            </div>
        </div>
    </div>

    <footer>
        <p>Сайт создан командой:</p>
        <p class="authors">B the B · Lap.comp · MCparkur · 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
